name: Deploy Web (Vercel)

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "postcss.config.js"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "vercel.json"
      - "tools/vercel-cli/**"
      - ".github/workflows/deploy-web-vercel.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  deploy-web:
    needs: test-web
    runs-on: ubuntu-latest
    environment: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/vercel-cli/package-lock.json

      - name: Install Vercel CLI
        working-directory: tools/vercel-cli
        run: npm ci

      - name: Vercel Pull
        run: tools/vercel-cli/node_modules/.bin/vercel pull --yes --environment=production --token=${{ secrets.VERCEL_DEPLOY_TOKEN }}

      - name: Vercel Build
        run: tools/vercel-cli/node_modules/.bin/vercel build --prod --token=${{ secrets.VERCEL_DEPLOY_TOKEN }}

      - name: Vercel Deploy
        shell: bash
        run: |
          max_attempts=3

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Vercel deploy attempt $attempt/$max_attempts"

            if tools/vercel-cli/node_modules/.bin/vercel deploy \
              --prebuilt \
              --prod \
              --token=${{ secrets.VERCEL_DEPLOY_TOKEN }}; then
              exit 0
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "Vercel deploy failed after $max_attempts attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "Transient deploy failure. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
