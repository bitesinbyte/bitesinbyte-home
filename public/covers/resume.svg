<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="70" r="110" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="330" r="80" fill="rgba(255,255,255,0.04)"/>

  <!-- Resume page (main) -->
  <g transform="translate(260, 40)">
    <rect x="0" y="0" width="180" height="240" rx="8" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <!-- Profile circle -->
    <circle cx="90" cy="45" r="22" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- Head -->
    <circle cx="90" cy="39" r="8" fill="rgba(255,255,255,0.3)"/>
    <!-- Shoulders -->
    <path d="M76 56 C76 48, 104 48, 104 56" fill="rgba(255,255,255,0.25)"/>

    <!-- Name line -->
    <rect x="50" y="76" width="80" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
    <!-- Title line -->
    <rect x="60" y="92" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>

    <!-- Divider -->
    <line x1="20" y1="108" x2="160" y2="108" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Section: Experience -->
    <rect x="20" y="118" width="50" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
    <rect x="20" y="132" width="140" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="143" width="120" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="20" y="154" width="130" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>

    <!-- Section: Skills -->
    <rect x="20" y="172" width="35" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
    <rect x="20" y="186" width="40" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
    <rect x="66" y="186" width="50" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
    <rect x="122" y="186" width="36" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
    <rect x="20" y="206" width="45" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
    <rect x="71" y="206" width="55" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Checkmark badge (ATS approved) -->
  <g transform="translate(460, 80)">
    <circle cx="30" cy="30" r="30" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <polyline points="16,30 26,40 44,20" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Smaller resume page (behind, offset) -->
  <g transform="translate(500, 140)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="16" y="20" width="60" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="16" y="34" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="16" y="45" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
    <rect x="16" y="56" width="100" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="16" y="74" width="45" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="16" y="88" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="16" y="99" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
    <rect x="16" y="110" width="95" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Title -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">RESUME BUILDER</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
