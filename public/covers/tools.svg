<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="70" r="110" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="330" r="80" fill="rgba(255,255,255,0.04)"/>

  <!-- Wrench icon (left side) -->
  <g transform="translate(120, 100)" opacity="0.2">
    <path d="M60,10 L50,20 L30,20 L20,30 L20,50 L30,60 L50,60 L60,50 L80,50 L90,40 L90,20 L80,10 Z" stroke="#fff" stroke-width="4" fill="none"/>
    <line x1="55" y1="55" x2="85" y2="85" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Central tool icons cluster -->
  <g transform="translate(280, 80)">
    <!-- JSON brackets card -->
    <rect x="0" y="0" width="100" height="100" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <text x="50" y="58" font-family="monospace" font-size="32" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">{ }</text>
    <text x="50" y="82" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">JSON</text>

    <!-- Base64 card -->
    <rect x="120" y="0" width="100" height="100" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <text x="170" y="55" font-family="monospace" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">B64</text>
    <text x="170" y="82" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">Base64</text>

    <!-- UUID card -->
    <rect x="60" y="120" width="100" height="100" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <text x="110" y="175" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">UUID</text>
    <text x="110" y="202" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">Generator</text>
  </g>

  <!-- Gear icon (right side) -->
  <g transform="translate(560, 110)" opacity="0.25">
    <circle cx="50" cy="50" r="30" stroke="#fff" stroke-width="3" fill="none"/>
    <circle cx="50" cy="50" r="12" stroke="#fff" stroke-width="2" fill="none"/>
    <!-- Gear teeth -->
    <rect x="44" y="10" width="12" height="16" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="44" y="74" width="12" height="16" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="10" y="44" width="16" height="12" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="74" y="44" width="16" height="12" rx="3" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- More dots indicating extensibility -->
  <g transform="translate(620, 220)" opacity="0.3">
    <circle cx="0" cy="0" r="4" fill="#fff"/>
    <circle cx="20" cy="0" r="4" fill="#fff"/>
    <circle cx="40" cy="0" r="4" fill="#fff"/>
  </g>

  <!-- Title -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">DEVELOPER TOOLS</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
