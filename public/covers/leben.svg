<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- German flag stripes (subtle, decorative at top) -->
  <rect x="0" y="0" width="800" height="6" fill="#000" opacity="0.15"/>
  <rect x="0" y="6" width="800" height="6" fill="#dd0000" opacity="0.15"/>
  <rect x="0" y="12" width="800" height="6" fill="#ffcc00" opacity="0.15"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="120" cy="300" r="90" fill="rgba(255,255,255,0.04)"/>

  <!-- Quiz card / test paper (main visual) -->
  <g transform="translate(120, 50)">
    <rect x="0" y="0" width="220" height="270" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="220" height="40" rx="12" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="28" width="220" height="12" fill="rgba(255,255,255,0.08)"/>
    <rect x="16" y="14" width="90" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="16" y="24" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>

    <!-- Question 1 -->
    <g transform="translate(16, 56)">
      <text x="0" y="12" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)" font-weight="600">Frage 1</text>
      <rect x="0" y="20" width="188" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="0" y="30" width="140" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
      <!-- Answer options -->
      <g transform="translate(0, 44)">
        <circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <rect x="22" y="4" width="100" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
      </g>
      <g transform="translate(0, 62)">
        <circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="3.5" fill="rgba(255,255,255,0.4)"/>
        <rect x="22" y="4" width="120" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
      </g>
      <g transform="translate(0, 80)">
        <circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <rect x="22" y="4" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
      </g>
      <g transform="translate(0, 98)">
        <circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <rect x="22" y="4" width="110" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
      </g>
    </g>

    <!-- Question 2 (partial, faded) -->
    <g transform="translate(16, 200)" opacity="0.6">
      <text x="0" y="12" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600">Frage 2</text>
      <rect x="0" y="20" width="170" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
      <rect x="0" y="30" width="120" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
      <g transform="translate(0, 44)">
        <circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        <rect x="22" y="4" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
      </g>
    </g>
  </g>

  <!-- Progress / Score card -->
  <g transform="translate(400, 50)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

    <!-- Progress ring -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="6"
      stroke-dasharray="141" stroke-dashoffset="42" stroke-linecap="round"
      transform="rotate(-90 50 50)"/>
    <text x="50" y="55" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="700">70%</text>

    <!-- Score label -->
    <text x="115" y="40" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Score</text>
    <text x="115" y="60" font-family="system-ui" font-size="22" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="700">21</text>
    <text x="115" y="74" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">/ 30</text>
  </g>

  <!-- Map of Germany (simplified outline) -->
  <g transform="translate(420, 170)" opacity="0.6">
    <path d="M60 0 L80 10 L90 5 L100 15 L95 30 L105 45 L110 40 L120 55 L115 70 L125 85 L120 100 L110 110 L105 130 L95 140 L80 145 L70 140 L55 150 L40 145 L30 135 L20 140 L10 130 L5 115 L15 100 L10 85 L20 70 L15 55 L25 40 L20 25 L30 15 L45 10 Z"
      fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Berlin dot -->
    <circle cx="80" cy="50" r="5" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <circle cx="80" cy="50" r="2" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Bundesland badges (16 states) -->
  <g transform="translate(580, 60)">
    <rect x="0" y="0" width="120" height="260" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="60" y="24" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="600">BUNDESLÄNDER</text>

    <!-- State pills -->
    <rect x="10" y="36" width="48" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="34" y="48" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Bayern</text>
    <rect x="62" y="36" width="48" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="86" y="48" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Berlin</text>

    <rect x="10" y="60" width="55" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="37" y="72" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Hamburg</text>
    <rect x="69" y="60" width="42" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="90" y="72" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">NRW</text>

    <rect x="10" y="84" width="50" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="35" y="96" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Hessen</text>
    <rect x="64" y="84" width="46" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="87" y="96" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Sachsen</text>

    <rect x="10" y="108" width="100" height="18" rx="9" fill="rgba(255,255,255,0.12)"/>
    <text x="60" y="120" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">Baden-Württemberg</text>

    <rect x="10" y="132" width="60" height="18" rx="9" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="144" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle">Bremen</text>
    <rect x="74" y="132" width="36" height="18" rx="9" fill="rgba(255,255,255,0.1)"/>
    <text x="92" y="144" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle">Saar</text>

    <!-- More indicator -->
    <g transform="translate(40, 162)">
      <circle cx="0" cy="6" r="2" fill="rgba(255,255,255,0.2)"/>
      <circle cx="12" cy="6" r="2" fill="rgba(255,255,255,0.15)"/>
      <circle cx="24" cy="6" r="2" fill="rgba(255,255,255,0.1)"/>
    </g>

    <!-- Checkmark for completion -->
    <g transform="translate(30, 185)">
      <circle cx="30" cy="18" r="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <text x="30" y="22" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle" font-weight="600">310</text>
      <text x="30" y="32" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Fragen</text>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">LEBEN IN DEUTSCHLAND</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
</svg>
