<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="120" cy="320" r="90" fill="rgba(255,255,255,0.04)"/>

  <!-- Shield / compliance icon (left) -->
  <g transform="translate(100, 80)" opacity="0.25">
    <path d="M50,10 L90,30 L90,70 Q90,100 50,120 Q10,100 10,70 L10,30 Z" stroke="#fff" stroke-width="3" fill="rgba(255,255,255,0.08)"/>
    <polyline points="30,65 45,80 75,50" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Central compliance matrix visual -->
  <g transform="translate(250, 50)">
    <!-- Table header row -->
    <rect x="0" y="0" width="300" height="35" rx="6" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="20" y="23" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="600">Service</text>
    <text x="120" y="23" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">ISO</text>
    <text x="155" y="23" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">SOC</text>
    <text x="190" y="23" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">PCI</text>
    <text x="225" y="23" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">HIPAA</text>
    <text x="265" y="23" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">C5</text>

    <!-- Row 1 -->
    <rect x="0" y="40" width="300" height="30" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="20" y="60" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">App Service</text>
    <text x="125" y="61" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="160" y="61" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="195" y="61" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="232" y="61" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="267" y="61" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>

    <!-- Row 2 -->
    <rect x="0" y="75" width="300" height="30" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="20" y="95" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Key Vault</text>
    <text x="125" y="96" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="160" y="96" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="195" y="96" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="232" y="96" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="267" y="96" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>

    <!-- Row 3 -->
    <rect x="0" y="110" width="300" height="30" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Cosmos DB</text>
    <text x="125" y="131" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="160" y="131" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="195" y="131" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">&mdash;</text>
    <text x="232" y="131" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="267" y="131" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>

    <!-- Row 4 -->
    <rect x="0" y="145" width="300" height="30" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="20" y="165" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Functions</text>
    <text x="125" y="166" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="160" y="166" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="195" y="166" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>
    <text x="232" y="166" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)">&mdash;</text>
    <text x="267" y="166" font-family="system-ui, sans-serif" font-size="14" fill="rgba(100,255,100,0.7)">&#10003;</text>

    <!-- Fade-out rows -->
    <rect x="0" y="180" width="300" height="30" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="0" y="215" width="300" height="25" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </g>

  <!-- Right side: certification badges -->
  <g transform="translate(610, 100)" opacity="0.3">
    <rect x="0" y="0" width="80" height="28" rx="14" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="19" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="600">ISO 27001</text>

    <rect x="0" y="38" width="80" height="28" rx="14" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="57" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="600">SOC 1/2/3</text>

    <rect x="0" y="76" width="80" height="28" rx="14" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="95" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="600">PCI DSS</text>

    <rect x="0" y="114" width="80" height="28" rx="14" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
    <text x="40" y="133" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="600">HIPAA</text>
  </g>

  <!-- Sync indicator -->
  <g transform="translate(630, 260)" opacity="0.25">
    <path d="M0,12 A12,12 0 1,1 12,24" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="12,20 12,28 18,24" fill="#fff"/>
    <path d="M24,12 A12,12 0 1,1 12,0" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="12,4 12,-4 6,0" fill="#fff"/>
  </g>

  <!-- Title -->
  <text x="400" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">AZURE COMPLIANCE MATRIX</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="50%" stop-color="#004578"/>
      <stop offset="100%" stop-color="#106ebe"/>
    </linearGradient>
  </defs>
</svg>