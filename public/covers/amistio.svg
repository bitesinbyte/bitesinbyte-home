<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
    <rect width="800" height="400" fill="url(#bg)" />

    <!-- Subtle grid pattern -->
    <g opacity="0.06">
        <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1" />
        <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1" />
        <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1" />
        <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1" />
    </g>

    <!-- Ambient rings -->
    <circle cx="690" cy="82" r="116" fill="rgba(255,255,255,0.045)" />
    <circle cx="112" cy="324" r="82" fill="rgba(255,255,255,0.04)" />

    <!-- Left project brain stack -->
    <g transform="translate(94, 80)" opacity="0.22">
        <rect x="0" y="0" width="150" height="190" rx="18" stroke="#fff" stroke-width="4"
            fill="rgba(255,255,255,0.06)" />
        <path d="M28 46H122" stroke="#fff" stroke-width="6" stroke-linecap="round" />
        <path d="M28 84H104" stroke="#fff" stroke-width="6" stroke-linecap="round" />
        <path d="M28 122H116" stroke="#fff" stroke-width="6" stroke-linecap="round" />
        <path d="M28 160H88" stroke="#fff" stroke-width="6" stroke-linecap="round" />
    </g>

    <!-- Central workflow cards -->
    <g transform="translate(265, 72)">
        <rect x="0" y="0" width="120" height="86" rx="14" fill="rgba(255,255,255,0.14)"
            stroke="rgba(255,255,255,0.28)" stroke-width="2" />
        <text x="60" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="18"
            fill="rgba(255,255,255,0.78)" text-anchor="middle" font-weight="700">WISH</text>
        <text x="60" y="62" font-family="system-ui, sans-serif" font-size="10"
            fill="rgba(255,255,255,0.46)" text-anchor="middle">intent</text>

        <rect x="150" y="0" width="120" height="86" rx="14" fill="rgba(255,255,255,0.14)"
            stroke="rgba(255,255,255,0.28)" stroke-width="2" />
        <text x="210" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="18"
            fill="rgba(255,255,255,0.78)" text-anchor="middle" font-weight="700">ADR</text>
        <text x="210" y="62" font-family="system-ui, sans-serif" font-size="10"
            fill="rgba(255,255,255,0.46)" text-anchor="middle">decision</text>

        <rect x="75" y="118" width="120" height="86" rx="14" fill="rgba(255,255,255,0.14)"
            stroke="rgba(255,255,255,0.28)" stroke-width="2" />
        <text x="135" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="18"
            fill="rgba(255,255,255,0.78)" text-anchor="middle" font-weight="700">PLAN</text>
        <text x="135" y="180" font-family="system-ui, sans-serif" font-size="10"
            fill="rgba(255,255,255,0.46)" text-anchor="middle">approval</text>

        <path d="M120 43H150" stroke="rgba(255,255,255,0.45)" stroke-width="3"
            stroke-linecap="round" />
        <path d="M190 86L154 118" stroke="rgba(255,255,255,0.45)" stroke-width="3"
            stroke-linecap="round" />
        <path d="M80 86L112 118" stroke="rgba(255,255,255,0.45)" stroke-width="3"
            stroke-linecap="round" />
    </g>

    <!-- Right local runner terminal -->
    <g transform="translate(572, 108)" opacity="0.28">
        <rect x="0" y="0" width="132" height="102" rx="14" stroke="#fff" stroke-width="3"
            fill="rgba(255,255,255,0.08)" />
        <circle cx="22" cy="22" r="4" fill="#fff" />
        <circle cx="38" cy="22" r="4" fill="#fff" />
        <circle cx="54" cy="22" r="4" fill="#fff" />
        <path d="M22 58L42 72L22 86" stroke="#fff" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
        <path d="M58 84H104" stroke="#fff" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Title -->
    <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="30"
        font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">
        AMISTIO</text>

    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
            <stop offset="0%" stop-color="#0f766e" />
            <stop offset="52%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#334155" />
        </linearGradient>
    </defs>
</svg>