      </text>
    </g>

    <g transform="translate(550 105)" filter="url(#shadow)">
      <rect width="180" height="138" rx="18" fill="#0F172A" fill-opacity="0.78" stroke="#5EEAD4" stroke-opacity="0.45" />
      <rect x="18" y="17" width="83" height="22" rx="11" fill="#2DD4BF" fill-opacity="0.12" />
