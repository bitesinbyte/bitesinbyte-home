<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="690" cy="90" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="110" cy="310" r="90" fill="rgba(255,255,255,0.04)"/>

  <!-- Stethoscope (simplified) -->
  <g transform="translate(100, 60)">
    <!-- Tubes -->
    <path d="M80 20 C80 80, 40 100, 40 160" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M120 20 C120 80, 160 100, 160 160" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Earpieces -->
    <circle cx="80" cy="16" r="6" fill="rgba(255,255,255,0.3)"/>
    <circle cx="120" cy="16" r="6" fill="rgba(255,255,255,0.3)"/>
    <!-- Y junction -->
    <path d="M40 160 C40 200, 100 220, 100 200 C100 220, 160 200, 160 160" stroke="rgba(255,255,255,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Chest piece -->
    <circle cx="100" cy="220" r="24" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
    <circle cx="100" cy="220" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  </g>

  <!-- AI Brain / Neural network -->
  <g transform="translate(320, 50)">
    <!-- Brain outline (simplified) -->
    <ellipse cx="90" cy="80" rx="80" ry="70" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <!-- Neural network nodes -->
    <!-- Layer 1 -->
    <circle cx="50" cy="50" r="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <circle cx="50" cy="90" r="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <circle cx="50" cy="130" r="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- Layer 2 -->
    <circle cx="100" cy="60" r="8" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="8" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

    <!-- Layer 3 -->
    <circle cx="140" cy="80" r="10" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

    <!-- Connections -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="1.5">
      <line x1="58" y1="50" x2="92" y2="60"/>
      <line x1="58" y1="50" x2="92" y2="100"/>
      <line x1="58" y1="90" x2="92" y2="60"/>
      <line x1="58" y1="90" x2="92" y2="100"/>
      <line x1="58" y1="130" x2="92" y2="60"/>
      <line x1="58" y1="130" x2="92" y2="100"/>
      <line x1="108" y1="60" x2="130" y2="80"/>
      <line x1="108" y1="100" x2="130" y2="80"/>
    </g>

    <!-- AI sparkle -->
    <g transform="translate(145, 40)" fill="rgba(255,255,255,0.5)">
      <path d="M6 0 L7.5 4.5 L12 6 L7.5 7.5 L6 12 L4.5 7.5 L0 6 L4.5 4.5 Z"/>
    </g>
  </g>

  <!-- 7-Step case flow (numbered steps) -->
  <g transform="translate(520, 60)">
    <!-- Step cards stacked -->
    <g>
      <rect x="0" y="0" width="180" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <circle cx="22" cy="18" r="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="22" y="22" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">1</text>
      <rect x="42" y="12" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="42" y="21" width="55" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    </g>
    <g transform="translate(0, 44)">
      <rect x="0" y="0" width="180" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <circle cx="22" cy="18" r="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="22" y="22" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">2</text>
      <rect x="42" y="12" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="42" y="21" width="60" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    </g>
    <g transform="translate(0, 88)">
      <rect x="0" y="0" width="180" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <circle cx="22" cy="18" r="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <text x="22" y="22" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">3</text>
      <rect x="42" y="12" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
      <rect x="42" y="21" width="100" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    </g>
    <!-- Dots indicating more steps -->
    <g transform="translate(80, 140)">
      <circle cx="0" cy="0" r="2.5" fill="rgba(255,255,255,0.25)"/>
      <circle cx="14" cy="0" r="2.5" fill="rgba(255,255,255,0.2)"/>
      <circle cx="28" cy="0" r="2.5" fill="rgba(255,255,255,0.15)"/>
    </g>
    <!-- Step 7 (last) with checkmark -->
    <g transform="translate(0, 158)">
      <rect x="0" y="0" width="180" height="36" rx="8" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <circle cx="22" cy="18" r="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
      <text x="22" y="22" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">7</text>
      <rect x="42" y="12" width="75" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
      <rect x="42" y="21" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
      <!-- Checkmark -->
      <polyline points="148,14 155,22 168,8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Medical cross + KI badge -->
  <g transform="translate(300, 210)">
    <!-- Cross -->
    <rect x="8" y="0" width="14" height="30" rx="3" fill="rgba(255,255,255,0.25)"/>
    <rect x="0" y="8" width="30" height="14" rx="3" fill="rgba(255,255,255,0.25)"/>
    <!-- KI label -->
    <rect x="44" y="4" width="36" height="22" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="62" y="19" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle" font-weight="700">KI</text>
  </g>

  <!-- Title -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">AMISTIO</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
</svg>
