        <rect x="50" width="42" height="32" rx="8" fill="#2DD4BF" fill-opacity="0.1" stroke="#5EEAD4" stroke-opacity="0.62" />
        <rect x="100" width="42" height="32" rx="8" fill="#2DD4BF" fill-opacity="0.1" stroke="#5EEAD4" stroke-opacity="0.62" />
        <circle cx="21" cy="16" r="4" fill="#5EEAD4" />
