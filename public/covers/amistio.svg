<svg
  xmlns="http://www.w3.org/2000/svg"
  width="800"
  height="400"
  viewBox="0 0 800 400"
  fill="none"
  role="img"
  aria-labelledby="amistio-cover-title amistio-cover-description"
>
  <title id="amistio-cover-title">Amistio visual AI agent builder</title>
  <desc id="amistio-cover-description">
    A visual agent draft becomes an immutable version and then an active automation
    above app actions, approval gates, and shareable runs.
  </desc>

  <defs>
    <linearGradient id="background" x1="48" y1="24" x2="752" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172554" />
      <stop offset="0.48" stop-color="#111827" />
      <stop offset="1" stop-color="#134E4A" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(400 185) rotate(90) scale(220 360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0.17" />
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="flow" x1="120" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5B4FC" />
      <stop offset="0.5" stop-color="#67E8F9" />
      <stop offset="1" stop-color="#5EEAD4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.34" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.045" />
    </pattern>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#67E8F9" />
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#background)" />
  <rect width="800" height="400" fill="url(#grid)" />
  <rect width="800" height="400" fill="url(#glow)" />
  <circle cx="92" cy="82" r="112" fill="#818CF8" fill-opacity="0.055" />
  <circle cx="724" cy="326" r="138" fill="#2DD4BF" fill-opacity="0.05" />

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="64" y="55" fill="#FFFFFF" fill-opacity="0.92" font-size="25" font-weight="700" letter-spacing="3">
